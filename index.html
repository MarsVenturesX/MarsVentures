<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARS VENTURES — Launching Soon</title>
  <meta name="description" content="Mars Ventures is launching soon. Join the list." />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Mars V" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Orbitron -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@300;400;600;800&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --font-headline: "Science Gothic", sans-serif;
      --font-body: "Montserrat", sans-serif;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --line: rgba(255,255,255,.22);
      --glass: rgba(255,255,255,.06);
      --glass2: rgba(0,0,0,.28);
      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --radius: 14px;
    }

    body{
      font-family: var(--font-body);
    }
    h1,h2,h3,.brandline{
      font-family: var(--font-headline);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      background:#05070c;
      overflow:hidden;
    }

    /* Hero background (image optional) */
    .hero{
      position:relative;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:56px 18px;
      background:
        radial-gradient(1200px 700px at 15% 15%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(1000px 600px at 85% 5%, rgba(255,255,255,.06), transparent 65%),
        radial-gradient(800px 500px at 80% 75%, rgba(140,180,255,.10), transparent 62%),
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.65)),
        url("bg.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* Animated star layers */
    .stars, .stars2, .stars3{
      position:absolute;
      inset:-30%;
      background-repeat:repeat;
      pointer-events:none;
      opacity:.6;
      animation: drift 80s linear infinite;
      transform: translateZ(0);
      mix-blend-mode: screen;
    }

    .stars{
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.85) 50%, transparent 52%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.65) 50%, transparent 52%),
        radial-gradient(1px 1px at 55% 35%, rgba(255,255,255,.75) 50%, transparent 52%),
        radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,.70) 50%, transparent 52%),
        radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,.55) 50%, transparent 52%);
      background-size:260px 260px;
      filter: blur(.15px);
    }

    .stars2{
      opacity:.35;
      animation-duration:130s;
      background-image:
        radial-gradient(1px 1px at 20% 10%, rgba(255,255,255,.55) 50%, transparent 52%),
        radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,.45) 50%, transparent 52%),
        radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,.50) 50%, transparent 52%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.40) 50%, transparent 52%);
      background-size:420px 420px;
      filter: blur(.25px);
    }

    .stars3{
      opacity:.20;
      animation-duration:180s;
      background-image:
        radial-gradient(1px 1px at 12% 72%, rgba(255,255,255,.40) 50%, transparent 52%),
        radial-gradient(1px 1px at 52% 12%, rgba(255,255,255,.35) 50%, transparent 52%),
        radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,.30) 50%, transparent 52%);
      background-size:600px 600px;
      filter: blur(.35px);
    }

    @keyframes drift{
      from{ transform: translate3d(0,0,0); }
      to{ transform: translate3d(180px, 140px, 0); }
    }

    /* Card */
    .card{
      position:relative;
      width:min(980px,100%);
      padding:38px 26px 26px;
      border-radius:22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.26));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align:center;

      /* Apple-style reveal */
      opacity:0;
      transform: translateY(10px);
      animation: reveal .9s ease-out forwards;
    }
    @keyframes reveal{
      to{ opacity:1; transform: translateY(0); }
    }

    .brandline{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      margin-bottom:16px;
      opacity:.9;
      letter-spacing:.18em;
      text-transform:uppercase;
      font-weight:600;
      font-size:12px;
    }
    .brandline .dot{
      width:6px; height:6px;
      border-radius:999px;
      background: rgba(255,255,255,.55);
      box-shadow: 0 0 16px rgba(255,255,255,.35);
    }

    h1{
      font-family: var(--font-headline);
      margin:0 0 10px;
      font-size: clamp(30px, 3.4vw, 54px);
      font-weight:400;
      letter-spacing:.44em;
      text-transform:uppercase;
      text-shadow:
        0 0 14px rgba(255,255,255,.25),
        0 0 40px rgba(120,160,255,.16);
    }

    .subtitle{
      font-family: var(--body-font);
      margin: 0 auto 26px;
      max-width: 56ch;
      color: var(--muted);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      letter-spacing:.02em;
      font-size: clamp(14px, 1.2vw, 16px);
      line-height:1.6;
    }

    /* Form */
    .form{
      width:min(760px,100%);
      margin: 0 auto;
      display:grid;
      grid-template-columns: 1fr auto;
      gap:12px;
      align-items:center;
    }

    .input{
      font-family: var(--body-font);
      position:relative;
    }

    input[type="email"]{
      width:100%;
      padding:14px 14px 14px 14px;
      border-radius: var(--radius);
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline:none;
      font-size:14px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease;
    }
    input::placeholder{ color: rgba(255,255,255,.45); }
    input:focus{
      border-color: rgba(255,255,255,.38);
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 6px rgba(120,160,255,.10);
    }

    button{
      padding:14px 20px;
      border-radius: var(--radius);
      border:1px solid rgba(255,255,255,.24);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      color: var(--text);
      cursor:pointer;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
      transition: transform .08s ease, background .2s ease, box-shadow .2s ease, border-color .2s ease;
      min-width: 148px;
    }
    button:hover{
      border-color: rgba(255,255,255,.38);
      box-shadow: 0 16px 40px rgba(0,0,0,.35), 0 0 30px rgba(120,160,255,.14);
      transform: translateY(-1px);
    }
    button:active{ transform: translateY(0px); }

    .fineprint{
      font-family: var(--body-font);
      margin-top:10px;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Social */
    .social{
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      text-decoration:none;
      color: rgba(255,255,255,.85);
      font-size: 12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      transition: background .2s ease, border-color .2s ease, transform .08s ease;
    }
    .chip:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.24);
      transform: translateY(-1px);
    }
    .chip svg{ width:16px; height:16px; fill: rgba(255,255,255,.82); }

    /* Footer micro */
    .footer{
      margin-top:18px;
      opacity:.55;
      font-size: 11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-family: var(--body-font);
    }

    /* Mobile */
    @media (max-width: 620px){
      .form{ grid-template-columns: 1fr; }
      button{ width:100%; min-width:auto; }
      h1{ letter-spacing:.16em; }
      .card{ padding:30px 18px 20px; }
    }

    /* Reduce motion accessibility */
    @media (prefers-reduced-motion: reduce){
      .stars, .stars2, .stars3, .glow{ animation:none !important; }
      .card{ animation:none !important; opacity:1; transform:none; }
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="stars" aria-hidden="true"></div>
    <div class="stars2" aria-hidden="true"></div>
    <div class="stars3" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <section class="card" role="region" aria-label="Launch signup">
      <div class="brandline">
        <span class="dot"></span>
        <span>Mission Brief</span>
        <span class="dot"></span>
      </div>

      <h1>MARS VENTURES</h1>
      <p class="subtitle">
        A venture studio for founders who build like engineers and execute like operators.
        Join the early list to get launch access and private updates.
      </p>

      <!-- FORM: replace action with your Formspree endpoint -->
      <form class="form" action="https://formspree.io/f/xpqyazlg" method="POST" id="signupForm">
        <div class="input">
          <input type="email" name="email" placeholder="Email address" required autocomplete="email" />
        </div>
        <button type="submit">Join List</button>
      </form>

      <div class="fineprint" id="msg" aria-live="polite">
        No spam. One-click unsubscribe. Launch updates only.
      </div>

      <nav class="social" aria-label="Social links">
        <a class="chip" href="https://x.com/MarsVenturesX" aria-label="X.com">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 2H22l-6.8 7.8L23 22h-6.7l-5.2-7.3L4.6 22H1.5l7.3-8.4L1 2h6.9l4.7 6.6L18.9 2zm-1.2 18h1.8L6.9 3.8H5L17.7 20z"/></svg>
          <span>X</span>
        </a>

        <a class="chip" href="https://www.linkedin.com/company/marsventuresx/" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.4 20.4h-3.6v-5.6c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9v5.7H9.3V9h3.4v1.6h.1c.5-.9 1.7-1.8 3.4-1.8 3.6 0 4.2 2.3 4.2 5.4v6.2zM5.3 7.4c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM7.1 20.4H3.5V9h3.6v11.4z"/></svg>
          <span>LinkedIn</span>
        </a>

        <a class="chip" href="https://www.youtube.com/@MarsVenturesX" aria-label="YouTube">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.6 7.2s-.2-1.6-.8-2.3c-.8-.8-1.7-.8-2.1-.9C15.8 3.8 12 3.8 12 3.8h0s-3.8 0-6.7.2c-.4.1-1.3.1-2.1.9-.6.7-.8 2.3-.8 2.3S2 9 2 10.8v2.3c0 1.8.4 3.6.4 3.6s.2 1.6.8 2.3c.8.8 1.9.8 2.4.9 1.7.2 6.4.2 6.4.2s3.8 0 6.7-.2c.4-.1 1.3-.1 2.1-.9.6-.7.8-2.3.8-2.3s.4-1.8.4-3.6v-2.3c0-1.8-.4-3.6-.4-3.6zM10 15.5V8.8l6.2 3.4L10 15.5z"/></svg>
          <span>YouTube</span>
        </a>
      </nav>

      <div class="footer">© <span id="year"></span> Mars Ventures • All rights reserved</div>
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Optional: AJAX submit for Formspree so it doesn't leave the page
    // Works with Formspree endpoints. Replace YOURFORMID in the form action.
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      // If you want normal form behavior, delete this listener entirely.
      e.preventDefault();

      msg.textContent = "Sending…";
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });

        if (res.ok) {
          form.reset();
          msg.textContent = "You’re in. We’ll notify you at launch.";
        } else {
          msg.textContent = "Hmm — something went wrong. Try again.";
        }
      } catch {
        msg.textContent = "Network issue. Please try again in a moment.";
      }
    });
  </script>
</body>
</html>
